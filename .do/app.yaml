# Haulbot — DigitalOcean App Platform spec
#
# Deploy:
#   1. Copy .do/env.production.local.yaml.example → .do/env.production.local.yaml
#   2. Fill every secret in env.production.local.yaml (gitignored)
#   3. python3 scripts/build-do-deploy-spec.py   → .do/app.deploy.yaml
#   4. doctl apps update <app-id> --spec .do/app.deploy.yaml --wait
#
# DNS (Porkbun / DO):
#   haulbot.online      → App default ingress (website + /api BFF)
#   api.haulbot.online  → Same app (backend API + Telegram webhook)
#
# After first deploy, set Stripe webhook to:
#   https://api.haulbot.online/v1/webhooks/stripe

name: haulbot
region: nyc

domains:
  - domain: haulbot.online
    type: PRIMARY
  - domain: api.haulbot.online
    type: ALIAS

# Reuse existing managed MongoDB cluster (same account as SwiftRelay).
# Override MONGODB_URI in env.production.local.yaml if you use a different cluster/db name.
databases:
  - name: mongodb
    engine: MONGODB
    production: true
    cluster_name: db-mongodb-nyc1-37383

# Shared production env — inherited by all components unless overridden.
envs:
  - key: NODE_ENV
    value: production
    scope: RUN_AND_BUILD_TIME

  # --- Public URLs ---
  - key: WEBSITE_URL
    value: https://haulbot.online
    scope: RUN_AND_BUILD_TIME
  - key: SOLO_API_ORIGIN
    value: https://api.haulbot.online
    scope: RUN_TIME
  - key: CORS_ORIGINS
    value: https://haulbot.online
    scope: RUN_TIME

  # --- Telegram ---
  - key: TELEGRAM_BOT_USERNAME
    value: agent_haulbot
    scope: RUN_AND_BUILD_TIME
  - key: TELEGRAM_WEBHOOK_URL
    value: https://api.haulbot.online/telegram/webhook
    scope: RUN_TIME
  - key: TELEGRAM_MINI_APP_URL
    value: https://haulbot.online/telegram/location.html
    scope: RUN_TIME
  - key: BOT_PORT
    value: "8081"
    scope: RUN_TIME

  # --- Email ---
  - key: EMAIL_FROM
    value: Haulbot <login@haulbot.online>
    scope: RUN_TIME

  # --- Billing (public key is baked into the website at build time) ---
  - key: VITE_TELEGRAM_BOT_USERNAME
    value: agent_haulbot
    scope: BUILD_TIME
  - key: VITE_GA_MEASUREMENT_ID
    value: G-YXZQMDJX8D
    scope: BUILD_TIME

  # --- Analytics / briefing ---
  - key: BRIEFING_UTC_HOUR
    value: "12"
    scope: RUN_TIME
  - key: VAULT_KV_MOUNT
    value: secret
    scope: RUN_TIME
  - key: AWS_REGION
    value: us-east-1
    scope: RUN_TIME
  - key: RELAY_REQUIRE_2FA
    value: "false"
    scope: RUN_TIME

  # --- Secrets (values in .do/env.production.local.yaml → build-do-deploy-spec.py) ---
  - key: MONGODB_URI
    scope: RUN_TIME
    type: SECRET
  - key: SESSION_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: ADMIN_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: DISPATCHER_SERVICE_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: EXTENSION_SERVICE_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: TELEGRAM_BOT_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: TELEGRAM_WEBHOOK_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: STRIPE_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
  - key: STRIPE_WEBHOOK_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: STRIPE_PRICE_ID
    scope: RUN_TIME
    type: SECRET
  - key: STRIPE_PUBLISHABLE_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: VITE_STRIPE_PUBLISHABLE_KEY
    scope: BUILD_TIME
    type: SECRET
  - key: RESEND_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ANALYTICS_ENGINE_URL
    scope: RUN_TIME
    type: SECRET
  - key: ANALYTICS_ENGINE_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: GA4_MEASUREMENT_ID
    scope: RUN_TIME
    type: SECRET
  - key: GA4_API_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: BRIEFING_ENABLED
    scope: RUN_TIME
    type: SECRET
  - key: VAULT_ADDR
    scope: RUN_TIME
    type: SECRET
  - key: VAULT_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: PROVISIONER
    scope: RUN_TIME
    type: SECRET
  - key: WSW_BROWSER_SETTINGS_ARN
    scope: RUN_TIME
    type: SECRET
  - key: WSW_NETWORK_SETTINGS_ARN
    scope: RUN_TIME
    type: SECRET
  - key: WSW_USER_SETTINGS_ARN
    scope: RUN_TIME
    type: SECRET

services:
  - name: backend
    git:
      repo_clone_url: https://github.com/solotechdude/haulbot.git
      branch: main
    build_command: bun install && bun run --filter @haulbot/email-templates export:magic-link
    run_command: bun run --filter @haulbot/backend start:prod
    environment_slug: bun
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      http_path: /health

  - name: bot
    git:
      repo_clone_url: https://github.com/solotechdude/haulbot.git
      branch: main
    build_command: bun install
    run_command: bun run --filter @haulbot/bot start:prod
    environment_slug: bun
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8081
    health_check:
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      http_path: /health

static_sites:
  - name: website
    git:
      repo_clone_url: https://github.com/solotechdude/haulbot.git
      branch: main
    build_command: bun install && bun run --filter @haulbot/website build
    output_dir: apps/website/dist
    catchall_document: index.html

ingress:
  rules:
    # Telegram webhook (all hostnames)
    - match:
        path:
          prefix: /telegram/webhook
      component:
        name: bot
        preserve_path_prefix: true

    # Browser BFF on marketing domain + default DO URL
    - match:
        path:
          prefix: /api/
      component:
        name: backend
        rewrite: /v1/

    # Extension + bot API on api.haulbot.online
    - match:
        authority:
          exact: api.haulbot.online
        path:
          prefix: /
      component:
        name: backend

    # Marketing + /solo + /admin SPA
    - match:
        path:
          prefix: /
      component:
        name: website
