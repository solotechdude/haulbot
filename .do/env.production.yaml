# Haulbot production environment variable catalog
# Non-secrets are set in app.yaml. This file documents every key and its consumer.
#
# Component key:
#   [app]     — all components (app-level in app.yaml)
#   [backend] — backend service only (inherits app-level)
#   [bot]     — bot service only (inherits app-level)
#   [website] — static site build only (inherits app-level BUILD_TIME vars)

variables:
  # Runtime — all services
  - key: NODE_ENV
    value: production
    components: [app]

  # URLs
  - key: WEBSITE_URL
    value: https://haulbot.online
    components: [app]
  - key: SOLO_API_ORIGIN
    value: https://api.haulbot.online
    components: [app]
  - key: CORS_ORIGINS
    value: https://haulbot.online
    components: [app]

  # Backend server
  - key: PORT
    value: "8080"
    components: [backend]
    note: Set automatically by DO from http_port

  # Bot
  - key: TELEGRAM_BOT_USERNAME
    value: agent_haulbot
    components: [app]
  - key: TELEGRAM_WEBHOOK_URL
    value: https://api.haulbot.online/telegram/webhook
    components: [app]
  - key: TELEGRAM_MINI_APP_URL
    value: https://haulbot.online/telegram/location.html
    components: [app]
  - key: BOT_PORT
    value: "8081"
    components: [app]

  # Email
  - key: EMAIL_FROM
    value: Haulbot <login@haulbot.online>
    components: [app]
  - key: RESEND_API_KEY
    secret: true
    components: [backend]

  # Auth / admin
  - key: SESSION_SECRET
    secret: true
    required: true
    components: [backend]
  - key: ADMIN_TOKEN
    secret: true
    components: [backend]

  # Service tokens (backend + bot must match on DISPATCHER_SERVICE_TOKEN)
  - key: DISPATCHER_SERVICE_TOKEN
    secret: true
    required: true
    components: [backend, bot]
  - key: EXTENSION_SERVICE_TOKEN
    secret: true
    required: true
    components: [backend]

  # Telegram
  - key: TELEGRAM_BOT_TOKEN
    secret: true
    required: true
    components: [backend, bot]
  - key: TELEGRAM_WEBHOOK_SECRET
    secret: true
    required: true
    components: [bot]

  # Stripe
  - key: STRIPE_SECRET_KEY
    secret: true
    required: true
    components: [backend]
  - key: STRIPE_WEBHOOK_SECRET
    secret: true
    required: true
    components: [backend]
  - key: STRIPE_PRICE_ID
    secret: true
    required: true
    components: [backend]
  - key: STRIPE_PUBLISHABLE_KEY
    secret: true
    required: true
    components: [backend, website]

  # Website build (Vite — baked in at deploy)
  - key: VITE_TELEGRAM_BOT_USERNAME
    value: agent_haulbot
    components: [website]
  - key: VITE_GA_MEASUREMENT_ID
    value: G-YXZQMDJX8D
    components: [website]
  - key: VITE_STRIPE_PUBLISHABLE_KEY
    secret: true
    components: [website]
    note: Same value as STRIPE_PUBLISHABLE_KEY

  # Database
  - key: MONGODB_URI
    value: ${mongodb.MONGODB_URI}
    components: [app]
    note: From attached cluster db-mongodb-nyc1-37383; append /haulbot if needed

  # Analytics engine
  - key: ANALYTICS_ENGINE_URL
    secret: true
    components: [backend]
  - key: ANALYTICS_ENGINE_TOKEN
    secret: true
    components: [backend]
  - key: BRIEFING_UTC_HOUR
    value: "12"
    components: [app]
  - key: BRIEFING_ENABLED
    secret: true
    components: [backend]

  # Vault — Relay credentials
  - key: VAULT_ADDR
    secret: true
    required: true
    components: [backend]
  - key: VAULT_TOKEN
    secret: true
    required: true
    components: [backend]
  - key: VAULT_KV_MOUNT
    value: secret
    components: [app]

  # AWS WorkSpaces Secure Browser provisioning
  - key: PROVISIONER
    secret: true
    components: [backend]
    note: Set to "aws" in production
  - key: AWS_REGION
    value: us-east-1
    components: [app]
  - key: WSW_BROWSER_SETTINGS_ARN
    secret: true
    components: [backend]
  - key: WSW_NETWORK_SETTINGS_ARN
    secret: true
    components: [backend]
  - key: WSW_USER_SETTINGS_ARN
    secret: true
    components: [backend]

  # Dev-only locally — keep false in production
  - key: RELAY_REQUIRE_2FA
    value: "false"
    components: [app]
